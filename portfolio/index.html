    <!-- Set theme before paint to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t !== 'paper' && t !== 'ink') t = 'ink';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
